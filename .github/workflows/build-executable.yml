name: Build Wrench Dashboard Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'  # Using 3.9 for better PyInstaller compatibility
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --clean --noconfirm WrenchDashboard.spec
    
    - name: Upload executable
      uses: actions/upload-artifact@v3
      with:
        name: WrenchDashboard-Windows
        path: dist/WrenchDashboard.exe
        retention-days: 30
    
    - name: Upload full dist folder
      uses: actions/upload-artifact@v3
      with:
        name: WrenchDashboard-Windows-Full
        path: dist/
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --clean --noconfirm WrenchDashboard.spec
    
    - name: Make executable
      run: chmod +x dist/WrenchDashboard
    
    - name: Upload executable
      uses: actions/upload-artifact@v3
      with:
        name: WrenchDashboard-Linux
        path: dist/WrenchDashboard
        retention-days: 30